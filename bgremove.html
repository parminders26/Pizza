<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BG Remover (Free)</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
  padding: 30px;
}

h2 {
  margin-bottom: 20px;
}

input, button {
  margin: 10px;
  padding: 10px 15px;
  border-radius: 6px;
  border: none;
}

button {
  background: #e74c3c;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #c0392b;
}

canvas {
  margin-top: 20px;
  max-width: 100%;
  border: 2px dashed #ccc;
  border-radius: 10px;
}
</style>

</head>
<body>

<h2>🍕 Free Background Remover</h2>

<input type="file" id="upload">
<br>

<button onclick="removeBG()">Remove Background</button>
<button id="downloadBtn" onclick="downloadImage()" style="display:none;">
  Download Image
</button>

<br>

<canvas id="canvas"></canvas>

<!-- Libraries -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix"></script>

<script>
async function removeBG() {
  const file = document.getElementById("upload").files[0];
  if (!file) {
    alert("Please upload an image!");
    return;
  }

  const img = new Image();
  img.src = URL.createObjectURL(file);

  img.onload = async () => {
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;

    // Load AI model
    const net = await bodyPix.load();

    // Detect object/person
    const segmentation = await net.segmentPerson(img);

    // Draw original image
    ctx.drawImage(img, 0, 0);

    // Get pixels
    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);

    // Remove background
    for (let i = 0; i < imgData.data.length; i += 4) {
      if (segmentation.data[i / 4] === 0) {
        imgData.data[i + 3] = 0; // make transparent
      }
    }

    ctx.putImageData(imgData, 0, 0);

    // Show download button
    document.getElementById("downloadBtn").style.display = "inline-block";
  };
}

function downloadImage() {
  const canvas = document.getElementById("canvas");

  const link = document.createElement("a");
  link.download = "pizza_no_bg.png";
  link.href = canvas.toDataURL("image/png"); // keep transparency
  link.click();
}
</script>

</body>
</html>
