<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin - Menu2</title>
<style>
body { font-family: Arial; padding: 30px; background: #f4f4f4; }
h2 { text-align: center; }
.box { max-width: 500px; margin: 20px auto; background: white; padding: 20px; border-radius: 10px; }
.box input, .box select { width: 100%; padding: 10px; margin: 8px 0; }
.box button { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; cursor: pointer; }
#list div { background: #fff; margin: 10px 0; padding: 10px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
#list div span { font-weight: bold; }
#list div button { background:red; color:white; border:none; padding:5px 10px; cursor:pointer; border-radius:5px; }
.btn-back { background: #34495e; color:white; border:none;}
</style>
</head>
<body>

<h2>Menu2 Admin Panel</h2>
<a href="admin.html" class="btn btn-back">← Back to POS</a>

<div class="box">
    <h3>Add New Item</h3>
    <input type="text" id="name" placeholder="Item Name">
    <input type="number" id="price" placeholder="Price">
    <select id="type">
        <option value="pizza">PIZZA</option>
        <option value="sandwich">SANDWICH</option>
        <option value="pasta">PASTA</option>
        <option value="fries">FRIES</option>
        <option value="burger">BURGER</option>
        <option value="snacks">SNACKS</option>
        <option value="drink">DRINKS</option>
    </select>
    <button onclick="addItem()">Add Item</button>
</div>

<h3 style="text-align:center; margin-top:30px;">Existing Menu2 Items</h3>
<div id="list"></div>

<script>
// Load existing Menu2 items
function loadItems() {
    fetch("http://localhost:3000/menu2")
    .then(res => res.json())
    .then(data => {
        const list = document.getElementById("list");
        list.innerHTML = "";
        data.forEach(item => {
            const div = document.createElement("div");
            div.innerHTML = `
                <span>${item.name} - ₹${item.price} [${item.type}]</span>
                <button onclick="deleteItem(${item.id})">Delete</button>
            `;
            list.appendChild(div);
        });
    });
}

// Add new Menu2 item
function addItem() {
    const name = document.getElementById("name").value;
    const price = document.getElementById("price").value;
    const type = document.getElementById("type").value;

    if(!name || !price){ alert("Fill all fields!"); return; }

    fetch("http://localhost:3000/menu2/add", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, price, type })
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
        document.getElementById("name").value = "";
        document.getElementById("price").value = "";
        loadItems();
    })
    .catch(err => console.error(err));
}

// Delete Menu2 item
function deleteItem(id){
    fetch(`http://localhost:3000/menu2/delete/${id}`, { method: "DELETE" })
    .then(res => res.json())
    .then(() => loadItems())
    .catch(err => console.error(err));
}

// Load items on page load
window.onload = loadItems;
</script>

</body>
</html>
