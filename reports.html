<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PizzaTopia | Daily Sales Report</title>
     <script src="/socket.io/socket.io.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 30px; background: #f4f7f6; color: #2c3e50; }
        .container { max-width: 1000px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        /* Summary Cards */
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; border-top: 5px solid #e74c3c; }
        .stat-card h4 { margin: 0; color: #7f8c8d; text-transform: uppercase; font-size: 0.8rem; }
        .stat-card p { margin: 10px 0 0; font-size: 1.8rem; font-weight: bold; color: #2c3e50; }
        .stat-card.highlight { border-top-color: #27ae60; }

        /* Table Styles */
        .report-card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        th { background: #2c3e50; color: white; }
        
        .btn { padding: 10px 15px; cursor: pointer; border: none; border-radius: 5px; color: white; font-weight: bold; text-decoration: none; }
        .btn-csv { background: #27ae60; }
        .btn-clear { background: #e74c3c; }
        .btn-back { background: #34495e; }
        #salesTableBody {
  transition: opacity 0.3s ease;
}
html {
  scroll-behavior: smooth;
}
    </style>
   
</head>
<body>

<div class="container">
    <div class="header">
        <h2>📊 Business Dashboard</h2>
        <a href="index.html" class="btn btn-back">← Back to POS</a>
       
    </div>
    <div class="top-bar">
  <a href="index.html" class="admin1">← Back to POS</a>
</div>
<div class="report-card" style="margin-bottom:20px;">
    <h3>📈 Daily Sales Graph</h3>
    <canvas id="salesChart" height="100"></canvas>
</div>
    <div class="summary-grid">
        <div class="stat-card">
            <h4>Total Orders</h4>
            <p id="totalOrders">0</p>
        </div>
        <div class="stat-card highlight">
            <h4>Grand Revenue</h4>
            <p id="grandTotalDisplay">$0.00</p>
        </div>
        <div class="stat-card">
            <h4>Top Selling Pizza</h4>
            <p id="topPizza" style="font-size: 1.2rem; color: #e74c3c;">None</p>
        </div>
    </div>

    <div class="report-card">
        <div style="margin-bottom: 20px;">
            <button onclick="downloadCSV()" class="btn btn-csv">Export to Excel (CSV)</button>
            <button onclick="clearSales()" class="btn btn-clear">Reset Sales Data</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Customer</th>
                    <th>Items</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody id="salesTableBody"></tbody>
        </table>
    </div>
</div>


<script>
    let lastHTML = ""; // global
async function loadSales() {
    try {
        const res = await fetch("http://localhost:3000/sales/today");
        const sales = await res.json();

        console.log("TABLE DATA:", sales);

        const tableBody = document.getElementById('salesTableBody');
        
        let grandTotal = 0;
        let html = "";
        let itemCounts = {};

        sales.forEach(order => {
            // ✅ SAFE VALUES
            const time = order.time || "-";
            const customer = order.customer || "Guest";
            const items = order.items || "";
            const total = parseFloat(order.total) || 0;

            grandTotal += total;

            // ✅ SAFE SPLIT
            let itemsArray = [];
            if (typeof items === "string") {
                itemsArray = items.split(",").map(i => i.trim());
            }

            itemsArray.forEach(item => {
                if(item !== "") {
                    itemCounts[item] = (itemCounts[item] || 0) + 1;
                }
            });

            html += `<tr>
                <td>${time}</td>
                <td>${customer}</td>
                <td>${items}</td>
                <td>₹${total.toFixed(2)}</td>
            </tr>`;
        });


         // ✅ ONLY update table if changed
        if (html !== lastHTML) {
            lastHTML = html;
            tableBody.innerHTML = html;
        }

        // ✅ ALWAYS update summary
        document.getElementById('grandTotalDisplay').innerText = "₹" + grandTotal.toFixed(2);
        document.getElementById('totalOrders').innerText = sales.length;

        let topItem = "None";
        let max = 0;

        for (let item in itemCounts) {
            if (itemCounts[item] > max) {
                max = itemCounts[item];
                topItem = item;
            }
        }

        // ✅ FORCE RENDER
        tableBody.innerHTML = html || "<tr><td colspan='4'>No sales today</td></tr>";

        document.getElementById('grandTotalDisplay').innerText = "₹" + grandTotal.toFixed(2);
        document.getElementById('totalOrders').innerText = sales.length;
        document.getElementById('topPizza').innerText = topItem + (max ? ` (${max})` : "");

    } catch (err) {
        console.error("TABLE ERROR:", err);
    }
}
async function loadGraph() {
    try {
        const res = await fetch("http://localhost:3000/sales/today");
        const sales = await res.json();

        console.log("GRAPH:", sales);

        const hourly = {};

        sales.forEach(order => {
            // ✅ SAFE HOUR EXTRACT
            const timePart = order.time.split(",")[1]; 
            let hour = timePart.trim().split(":")[0];

            if (timePart.includes("PM") && hour != 12) hour = parseInt(hour) + 12;
            if (timePart.includes("AM") && hour == 12) hour = 0;

            hour = parseInt(hour);

            hourly[hour] = (hourly[hour] || 0) + order.total;
        });

        const labels = [];
        const data = [];

        for(let i=0;i<24;i++){
            labels.push(i + ":00");
            data.push(hourly[i] || 0);
        }

        const ctx = document.getElementById("salesChart").getContext("2d");

        if(window.chart) window.chart.destroy();

        window.chart = new Chart(ctx, {
            type: "line",
            data: {
                labels: labels,
                datasets: [{
                    label: "Sales ₹",
                    data: data,
                    borderWidth: 2,
                    tension: 0.3
                }]
            }
        });

    } catch(err) {
        console.error("Graph error:", err);
    }
}

// ✅ FIXED CALL
window.onload = function () {
    console.log("Page Loaded ✅");
    loadSales();
    loadGraph(); // ✅ correct name
};

async function downloadCSV() {
    try {
        const res = await fetch("http://localhost:3000/sales");
        const sales = await res.json();

        console.log("CSV DATA:", sales);

        if (!sales || sales.length === 0) {
            alert("No data to export");
            return;
        }

        let csv = "Time,Customer,Items,Total\n";

        sales.forEach(o => {
            csv += `${o.time},${o.customer},"${o.items}",${o.total}\n`;
        });

        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);

        const a = document.createElement('a');
        a.href = url;
        a.download = "Sales_Report.csv";
        a.click();

    } catch (err) {
        console.error("CSV Error:", err);
    }
}

async function clearSales() {
    if (!confirm("Delete all records?")) return;

    try {
        const res = await fetch("http://localhost:3000/sales", {
            method: "DELETE"
        });

        const data = await res.json();
        console.log("CLEAR RESPONSE:", data);

        alert("Sales cleared ✅");

        // 🔥 refresh UI
        loadSales();
        loadGraph();

    } catch (err) {
        console.error("CLEAR ERROR:", err);
    }
}


async function updateSummaryOnly() {
  try {
    const res = await fetch("http://localhost:3000/sales/today");
    const sales = await res.json();

    let grandTotal = 0;
    let itemCounts = {};

    sales.forEach(order => {
      const total = parseFloat(order.total) || 0;
      grandTotal += total;

      if (order.items) {
        order.items.split(",").forEach(item => {
          item = item.trim();
          if (item) {
            itemCounts[item] = (itemCounts[item] || 0) + 1;
          }
        });
      }
    });

    // 👉 Top pizza
    let topItem = "None";
    let max = 0;

    for (let item in itemCounts) {
      if (itemCounts[item] > max) {
        max = itemCounts[item];
        topItem = item;
      }
    }

    // ✅ ONLY UPDATE NUMBERS
    document.getElementById('grandTotalDisplay').innerText = "₹" + grandTotal.toFixed(2);
    document.getElementById('totalOrders').innerText = sales.length;
    document.getElementById('topPizza').innerText = topItem + (max ? ` (${max})` : "");

  } catch (err) {
    console.error("Summary error:", err);
  }
}

async function smartTableUpdate() {
  try {
    const res = await fetch("http://localhost:3000/sales/today");
    const data = await res.json();

    // ✅ Only update if new order added
    if (data.length !== lastCount) {
      lastCount = data.length;

      console.log("New order → updating table ✅");
      loadSales(); // update table only when needed
    }

  } catch (err) {
    console.error(err);
  }
}

// check every 5 sec
setInterval(smartTableUpdate, 5000);


let scrollPos = 0;

function saveScroll() {
  scrollPos = window.scrollY;
}

function restoreScroll() {
  window.scrollTo(0, scrollPos);
}
setInterval(() => {
  saveScroll();        // ✅ save position

  setTimeout(() => {
    restoreScroll();   // ✅ restore position
  }, 100);
updateSummaryOnly();
}, 5000);
window.onload = function () {
    loadSales();  // load once
    loadGraph();  // load once
};
</script>



</body>
</html>
